name: Build market data

# Rebuilds data/market.json from the data/<dd-mm-yyyy>/ snapshots and commits
# it back, so the deployed site always serves an up-to-date dataset — even when
# snapshots are added through the GitHub web UI (where local hooks can't run).

on:
  push:
    branches: [ main ]
    paths:
      - 'data/**'
      - 'scripts/build.py'
      - '.github/workflows/build-market-data.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-market-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Rebuild data/market.json
        run: python3 scripts/build.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- data/market.json; then
            echo "data/market.json is already up to date."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market.json
          git commit -m "chore: rebuild data/market.json [skip ci]"
          git push
